<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader — THE CRIS IF</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap');

:root {
  --pink:#ff1e55;
  --pink2:#ff6b8a;
  --cyan:#00e5ff;
  --purple:#a050ff;
  --bg:#05050a;
  --bg2:#0e0e16;
  --bg3:#16161f;
  --border:rgba(255,255,255,0.07);
  --text:rgba(255,255,255,0.92);
  --text2:rgba(255,255,255,0.5);
  --text3:rgba(255,255,255,0.22);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  padding:28px 14px 80px;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,30,85,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,30,85,0.035) 1px,transparent 1px);
  background-size:42px 42px;
  pointer-events:none;
}

body::after{
  content:'';position:fixed;
  top:-30%;left:50%;transform:translateX(-50%);
  width:100vw;height:70vh;
  background:radial-gradient(ellipse,rgba(255,30,85,0.07) 0%,transparent 65%);
  pointer-events:none;
  animation:glow 6s ease-in-out infinite alternate;
}
@keyframes glow{from{opacity:.5}to{opacity:1}}

/* HEADER */
.header{
  text-align:center;margin-bottom:28px;
  position:relative;z-index:2;
  animation:fadeDown .7s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}

.logo-ring{
  width:68px;height:68px;
  margin:0 auto 12px;position:relative;
  animation:pop .6s cubic-bezier(.34,1.56,.64,1) .2s both;
}
@keyframes pop{from{transform:scale(.4) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

.logo-ring::before{
  content:'';position:absolute;inset:-3px;border-radius:22px;
  background:conic-gradient(var(--pink) 0%,#ff7700 25%,var(--cyan) 50%,var(--purple) 75%,var(--pink) 100%);
  animation:spinR 3s linear infinite;
}
@keyframes spinR{to{transform:rotate(360deg)}}

.logo-inner{
  position:absolute;inset:3px;background:var(--bg2);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;z-index:1;
}

.title{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(2.4rem,9vw,3.8rem);
  letter-spacing:.08em;line-height:1;
  background:linear-gradient(135deg,#fff 0%,#ff90b0 40%,var(--pink) 70%,#b00040 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 24px rgba(255,30,85,.35));
}

.subtitle{
  font-size:.68rem;color:var(--text3);
  letter-spacing:.38em;margin-top:4px;
  font-weight:600;text-transform:uppercase;
}

.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:12px}

.badge{
  position:relative;display:inline-flex;
  padding:1px;border-radius:22px;
  background:linear-gradient(90deg,var(--pink),var(--cyan),var(--purple),var(--pink));
  background-size:300% 100%;
  animation:bb 5s linear infinite;
}
@keyframes bb{to{background-position:-300% 0}}

.badge span{
  background:rgba(255,255,255,.04);border-radius:20px;
  padding:4px 13px;color:var(--text2);font-weight:700;
  font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;
}

/* CARD */
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:22px;
  padding:28px 20px;width:100%;max-width:600px;
  box-shadow:0 30px 80px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.05);
  animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .1s both;
  position:relative;overflow:hidden;z-index:2;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

.card-line{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--pink) 20%,var(--cyan) 50%,var(--purple) 80%,transparent);
  background-size:200% 100%;animation:slide 4s linear infinite;
}
@keyframes slide{from{background-position:200% 0}to{background-position:-200% 0}}

.s-label{
  font-size:.65rem;font-weight:700;letter-spacing:.22em;color:var(--text3);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.s-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.07),transparent)}

/* INPUT */
.input-wrap{position:relative;margin-bottom:16px}

.url-input{
  width:100%;padding:15px 54px 15px 18px;
  border-radius:13px;border:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.45);color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:500;
  outline:none;transition:border-color .3s,box-shadow .3s,background .3s;
  -webkit-appearance:none;
}
.url-input:focus{border-color:rgba(255,30,85,.55);background:rgba(255,30,85,.04);box-shadow:0 0 0 3px rgba(255,30,85,.1)}
.url-input::placeholder{color:rgba(255,255,255,.15)}

.paste-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:rgba(255,30,85,.1);border:1px solid rgba(255,30,85,.2);
  border-radius:9px;color:var(--pink2);font-size:1rem;cursor:pointer;
  transition:all .2s;padding:6px 9px;line-height:1;
}
.paste-btn:hover{background:rgba(255,30,85,.2);transform:translateY(-50%) scale(1.08)}

/* BTN PRINCIPAL */
.btn-main{
  width:100%;padding:16px;border-radius:13px;border:none;
  background:linear-gradient(135deg,var(--pink) 0%,#b80030 100%);
  color:white;font-family:'Bebas Neue',cursive;
  font-size:1.15rem;letter-spacing:.12em;cursor:pointer;
  transition:all .3s;box-shadow:0 4px 24px rgba(255,30,85,.35);
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(255,30,85,.5)}
.btn-main:active{transform:translateY(0)}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* STATUS */
.status-box{
  display:none;margin-top:14px;padding:13px 16px;border-radius:11px;
  font-weight:600;font-size:.88rem;letter-spacing:.03em;line-height:1.55;
  animation:fadeUp .3s ease;
}
.s-loading{background:rgba(255,170,0,.07);border:1px solid rgba(255,170,0,.2);color:#ffbb33}
.s-ok{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);color:var(--cyan)}
.s-error{background:rgba(255,30,85,.07);border:1px solid rgba(255,30,85,.2);color:var(--pink2)}

/* PROGRESS */
.progress-wrap{display:none;margin-top:10px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;height:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--cyan));border-radius:6px;transition:width .3s ease;width:0%}

/* RESULT */
.result-box{
  display:none;margin-top:16px;
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;overflow:hidden;
  animation:fadeUp .5s cubic-bezier(.16,1,.3,1);
}

.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden}
.thumb-img{width:100%;height:100%;object-fit:cover;display:block;opacity:.8}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%)}
.thumb-tag{
  position:absolute;bottom:10px;left:12px;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:3px 10px;
  font-size:.68rem;font-weight:700;letter-spacing:.1em;
  color:rgba(255,255,255,.7);text-transform:uppercase;
}

.result-body{padding:16px 18px}
.result-title{
  font-size:.95rem;font-weight:700;color:var(--text);
  margin-bottom:10px;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.meta-chip{
  font-size:.7rem;color:var(--text2);font-weight:600;letter-spacing:.07em;
  background:rgba(255,255,255,.04);padding:4px 10px;border-radius:6px;
  border:1px solid rgba(255,255,255,.06);
}
.meta-chip b{color:var(--pink2)}

/* DL BUTTONS */
.dl-grid{display:flex;flex-direction:column;gap:9px}

.dl-btn{
  width:100%;padding:14px 16px;border-radius:11px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;
  transition:all .22s;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.dl-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

.dl-4k{
  background:linear-gradient(135deg,rgba(255,30,85,.18),rgba(180,0,60,.12));
  border:1px solid rgba(255,30,85,.45);color:#fff;
  box-shadow:0 0 20px rgba(255,30,85,.12);
}
.dl-4k:hover{background:linear-gradient(135deg,rgba(255,30,85,.28),rgba(180,0,60,.2));transform:translateY(-2px);box-shadow:0 4px 24px rgba(255,30,85,.28)}

.dl-hd{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.28);color:var(--cyan)}
.dl-hd:hover{background:rgba(0,229,255,.14);transform:translateY(-1px)}

.dl-normal{background:rgba(160,80,255,.07);border:1px solid rgba(160,80,255,.28);color:#c084fc}
.dl-normal:hover{background:rgba(160,80,255,.14);transform:translateY(-1px)}

.dl-audio{background:rgba(255,170,0,.07);border:1px solid rgba(255,170,0,.28);color:#ffcc44}
.dl-audio:hover{background:rgba(255,170,0,.14);transform:translateY(-1px)}

.dl-left{display:flex;align-items:center;gap:10px}
.dl-icon{font-size:1.2rem;line-height:1}
.dl-info{}
.dl-title{display:block;font-size:.85rem;font-weight:700}
.dl-sub{display:block;font-size:.68rem;opacity:.55;font-weight:500;margin-top:1px}
.dl-arrow{font-size:.85rem;opacity:.45}

.tip{
  margin-top:12px;padding:11px 13px;
  background:rgba(255,170,0,.05);border:1px solid rgba(255,170,0,.12);
  border-radius:9px;font-size:.78rem;color:rgba(255,190,50,.75);line-height:1.75;
}

/* FEATURES */
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:20px}
.feature{
  text-align:center;padding:13px 6px;
  background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.05);
  border-radius:12px;transition:border-color .2s;
}
.feature:hover{border-color:rgba(255,30,85,.15)}
.fi{font-size:1.4rem;display:block;margin-bottom:4px}
.ft{font-size:.63rem;color:var(--text3);letter-spacing:.06em;font-weight:700;line-height:1.5;text-transform:uppercase}

/* SPINNER */
.sp{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,170,0,.25);border-top-color:#ffbb33;
  border-radius:50%;animation:spinR .75s linear infinite;
  vertical-align:middle;margin-right:6px;
}

/* FOOTER */
.footer{
  margin-top:26px;text-align:center;
  color:rgba(255,255,255,.1);font-size:.7rem;letter-spacing:.12em;
  font-weight:600;text-transform:uppercase;position:relative;z-index:2;
}
.footer b{color:var(--pink)}
</style>
</head>
<body>

<div class="header">
  <div class="logo-ring"><div class="logo-inner">🎵</div></div>
  <div class="title">TikTok DL</div>
  <div class="subtitle">The Cris IF Edition</div>
  <div class="badges">
    <div class="badge"><span>🔥 4K / HD</span></div>
    <div class="badge"><span>🚫 Sin marca</span></div>
    <div class="badge"><span>🎵 Audio MP3</span></div>
    <div class="badge"><span>⚡ Gratis</span></div>
  </div>
</div>

<div class="card">
  <div class="card-line"></div>

  <div class="s-label">🔗 Link del video</div>
  <div class="input-wrap">
    <input class="url-input" id="url-input" type="text"
      placeholder="https://www.tiktok.com/@usuario/video/..."
      onkeydown="if(event.key==='Enter')buscar()">
    <button class="paste-btn" onclick="pegar()">📋</button>
  </div>

  <button class="btn-main" id="btn-main" onclick="buscar()">⬇️ OBTENER VIDEO</button>

  <div class="status-box" id="status-box"></div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="result-box" id="result-box"></div>

  <div class="features">
    <div class="feature"><span class="fi">🚫</span><div class="ft">Sin marca<br>de agua</div></div>
    <div class="feature"><span class="fi">🔥</span><div class="ft">4K / HD<br>calidad</div></div>
    <div class="feature"><span class="fi">⚡</span><div class="ft">Rápido<br>y gratis</div></div>
  </div>
</div>

<div class="footer">Hecho con ❤️ por <b>THE CRIS IF</b></div>

<script>
var working = false;

async function pegar() {
  try {
    var t = await navigator.clipboard.readText();
    if (t) document.getElementById('url-input').value = t.trim();
  } catch(e) { document.getElementById('url-input').select(); }
}

function setStatus(cls, html) {
  var el = document.getElementById('status-box');
  el.className = 'status-box ' + cls;
  el.innerHTML = html;
  el.style.display = 'block';
}

function setProgress(v) {
  var w = document.getElementById('progress-wrap');
  var f = document.getElementById('progress-fill');
  if (v === null) { w.style.display='none'; f.style.width='0%'; return; }
  w.style.display='block'; f.style.width=v+'%';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fname(data, tipo) {
  var uid = (data.author && data.author.unique_id) ? data.author.unique_id : 'tiktok';
  var safe = uid.replace(/[^a-z0-9_-]/gi,'_').substring(0,24);
  return 'crisif_' + safe + '_' + Date.now() + (tipo==='audio' ? '.mp3' : '.mp4');
}

async function dlBlob(url, filename, btn) {
  if (!url || !btn) return;
  var origTitle = btn.querySelector('.dl-title').textContent;
  btn.disabled = true;
  btn.querySelector('.dl-title').textContent = 'Descargando...';
  setProgress(10);

  var mime = filename.endsWith('.mp3') ? 'audio/mpeg' : 'video/mp4';
  var blob = null;

  // Método 1: directo
  try {
    var r = await fetch(url, { mode:'cors' });
    if (r.ok) {
      setProgress(45);
      var b = await r.blob();
      if (b.size > 5000) blob = new Blob([b], { type: mime });
    }
  } catch(e) {}

  // Método 2: proxy
  if (!blob) {
    try {
      setProgress(30);
      var r2 = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
      if (r2.ok) {
        setProgress(60);
        var b2 = await r2.blob();
        if (b2.size > 5000) blob = new Blob([b2], { type: mime });
      }
    } catch(e) {}
  }

  setProgress(90);

  if (blob && blob.size > 5000) {
    var burl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=burl; a.download=filename; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(burl); }, 10000);
    setProgress(100);
    setTimeout(function(){ setProgress(null); }, 1400);
    btn.querySelector('.dl-title').textContent = '✅ ¡Guardado!';
    setTimeout(function(){ btn.querySelector('.dl-title').textContent = origTitle; btn.disabled=false; }, 3500);
  } else {
    setProgress(null);
    window.open(url, '_blank');
    btn.querySelector('.dl-title').textContent = origTitle;
    btn.disabled = false;
  }
}

function mkBtn(cls, icon, title, sub, url, data, tipo) {
  if (!url) return null;
  var n = fname(data, tipo);
  var btn = document.createElement('button');
  btn.className = 'dl-btn ' + cls;
  btn.dataset.url = url;
  btn.dataset.name = n;
  btn.innerHTML =
    '<div class="dl-left">'
    + '<span class="dl-icon">' + icon + '</span>'
    + '<div class="dl-info">'
    +   '<span class="dl-title">' + title + '</span>'
    +   '<span class="dl-sub">' + sub + '</span>'
    + '</div></div>'
    + '<span class="dl-arrow">⬇</span>';
  btn.addEventListener('click', function(){ dlBlob(this.dataset.url, this.dataset.name, this); });
  return btn;
}

function render(data) {
  var url4k   = data.hdplay || '';
  var urlHD   = data.play   || data.hdplay || '';
  var urlNorm = data.wmplay || '';
  var urlAud  = data.music  || '';
  var thumb   = data.cover  || data.origin_cover || '';
  var uid     = esc((data.author && data.author.unique_id) || '');
  var dur     = data.duration   ? data.duration+'s'                              : '';
  var plays   = data.play_count ? '▶ '+Number(data.play_count).toLocaleString() : '';
  var likes   = data.digg_count ? '❤️ '+Number(data.digg_count).toLocaleString(): '';
  var title   = esc(data.title  || 'Video de TikTok');

  var box = document.getElementById('result-box');
  box.innerHTML = '';

  // Thumbnail
  if (thumb) {
    box.innerHTML =
      '<div class="thumb-wrap">'
      + '<img class="thumb-img" src="'+esc(thumb)+'" loading="lazy" onerror="this.closest(\'.thumb-wrap\').style.display=\'none\'">'
      + '<div class="thumb-overlay"></div>'
      + '<span class="thumb-tag">📹 TikTok</span>'
      + '</div>';
  }

  var body = document.createElement('div');
  body.className = 'result-body';

  // Título
  var t = document.createElement('div');
  t.className = 'result-title'; t.textContent = data.title || 'Video de TikTok';
  body.appendChild(t);

  // Chips
  var chips = [
    uid   ? '👤 <b>@'+uid+'</b>'  : '',
    dur   ? '⏱ <b>'+dur+'</b>'    : '',
    plays ? plays                   : '',
    likes ? likes                   : '',
  ].filter(Boolean);
  if (chips.length) {
    var mr = document.createElement('div'); mr.className='meta-row';
    chips.forEach(function(c){ var s=document.createElement('span'); s.className='meta-chip'; s.innerHTML=c; mr.appendChild(s); });
    body.appendChild(mr);
  }

  // Botones
  var grid = document.createElement('div');
  grid.className = 'dl-grid';

  // 🔥 4K — si hdplay existe y es diferente a play
  var b4k = url4k ? mkBtn('dl-4k','🔥',
    url4k !== urlHD ? 'Descargar 4K' : 'Descargar HD/4K',
    'Máxima calidad — puede requerir Android 5+',
    url4k, data, 'hd') : null;
  if (b4k) grid.appendChild(b4k);

  // 📹 HD — play normal (H.264 universal)
  var bHD = (urlHD && urlHD !== url4k) ? mkBtn('dl-hd','📹','Descargar HD','Alta calidad H.264 — compatible con todos',urlHD,data,'normal') : null;
  if (bHD) grid.appendChild(bHD);

  // 📱 Normal — wmplay si existe
  var bNorm = (urlNorm && urlNorm !== urlHD && urlNorm !== url4k) ? mkBtn('dl-normal','📱','Calidad Normal','Si los anteriores fallan — más compatible',urlNorm,data,'normal') : null;
  if (bNorm) grid.appendChild(bNorm);

  // 🎵 Audio
  var bAud = urlAud ? mkBtn('dl-audio','🎵','Solo Audio (MP3)','Música del video sin imagen',urlAud,data,'audio') : null;
  if (bAud) grid.appendChild(bAud);

  body.appendChild(grid);

  // Tip
  var tip = document.createElement('div'); tip.className='tip';
  tip.innerHTML = '⚠️ <b>¿Sale corrupto o no reproduce?</b><br>'
    + '1️⃣ Prueba <b>4K</b> primero<br>'
    + '2️⃣ Si falla usa <b>HD</b> (H.264 universal)<br>'
    + '3️⃣ Si sigue fallando usa <b>Normal</b>';
  body.appendChild(tip);

  box.appendChild(body);
  box.style.display = 'block';
}

async function buscar() {
  if (working) return;
  var url = document.getElementById('url-input').value.trim();
  var btn = document.getElementById('btn-main');

  if (!url) { setStatus('s-error','❌ Pega un enlace de TikTok primero'); return; }
  if (!/tiktok\.com|vm\.tiktok|vt\.tiktok/i.test(url)) { setStatus('s-error','❌ El enlace debe ser de TikTok'); return; }

  working=true; btn.disabled=true;
  document.getElementById('result-box').style.display='none';
  setProgress(null);
  setStatus('s-loading','<span class="sp"></span> Buscando video en máxima calidad...');

  try {
    var form = new FormData();
    form.append('url', url);
    form.append('hd', '1');
    var resp = await fetch('https://www.tikwm.com/api/', { method:'POST', body:form });
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    var json = await resp.json();

    if (json.code === 0 && json.data) {
      setStatus('s-ok','✅ Video encontrado — prueba <b>4K</b> primero, si falla usa <b>HD</b>');
      render(json.data);
    } else {
      // Reintento sin hd
      var f2 = new FormData(); f2.append('url',url);
      var r2 = await fetch('https://www.tikwm.com/api/', { method:'POST', body:f2 });
      var j2 = await r2.json();
      if (j2.code === 0 && j2.data) {
        setStatus('s-ok','✅ Video encontrado');
        render(j2.data);
      } else {
        setStatus('s-error','❌ No se pudo obtener el video. Prueba con otro enlace.');
      }
    }
  } catch(e) {
    setStatus('s-error','❌ Error de conexión. Verifica tu internet.');
  }

  working=false; btn.disabled=false;
}
</script>
</body>
</html>
