<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TikTok Downloader — THE CRIS IF</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap');

:root {
  --r:255; --g:30; --b:85;
  --rgb:var(--r),var(--g),var(--b);
  --pink:    rgb(255,30,85);
  --pink-l:  rgb(255,90,130);
  --pink-d:  rgb(180,0,50);
  --cyan:    rgb(0,230,255);
  --purple:  rgb(160,80,255);
  --bg:      #05050a;
  --bg3:     #111119;
  --bg4:     #18181f;
  --text:    rgba(255,255,255,0.92);
  --text2:   rgba(255,255,255,0.55);
  --text3:   rgba(255,255,255,0.25);
  --borderW: rgba(255,255,255,0.07);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px 14px 90px;
  overflow-x:hidden;
  position:relative;
}

/* ── BG GRID ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,30,85,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,30,85,0.04) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
  pointer-events:none;
  z-index:0;
}

/* ── CONIC TOP GLOW ── */
body::after{
  content:'';
  position:fixed;
  top:-35%;left:50%;
  transform:translateX(-50%);
  width:110vw;height:80vh;
  background:conic-gradient(
    from 180deg at 50% 50%,
    rgba(255,30,85,0.08) 0deg,
    rgba(160,80,255,0.06) 120deg,
    rgba(0,230,255,0.05) 240deg,
    rgba(255,30,85,0.08) 360deg
  );
  border-radius:50%;
  animation:bgRotate 20s linear infinite;
  filter:blur(50px);
  pointer-events:none;
  z-index:0;
}

@keyframes bgRotate{to{transform:translateX(-50%) rotate(360deg)}}

/* ── ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;animation:orbFloat 9s ease-in-out infinite alternate}
.orb-1{width:280px;height:280px;top:-70px;left:-70px;background:radial-gradient(circle,rgba(255,30,85,0.13) 0%,transparent 70%)}
.orb-2{width:240px;height:240px;bottom:-50px;right:-50px;background:radial-gradient(circle,rgba(0,230,255,0.1) 0%,transparent 70%);animation-delay:-5s}
.orb-3{width:190px;height:190px;top:42%;right:-30px;background:radial-gradient(circle,rgba(160,80,255,0.09) 0%,transparent 70%);animation-delay:-2.5s}
@keyframes orbFloat{from{transform:scale(1) translateY(0)}to{transform:scale(1.15) translateY(-22px)}}

/* ═══════════════════════
   HEADER
═══════════════════════ */
.header{
  text-align:center;
  margin-bottom:30px;
  position:relative;z-index:2;
  animation:fadeDown 0.8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-28px)}to{opacity:1;transform:translateY(0)}}

/* RGB logo ring */
.logo-ring{
  width:72px;height:72px;
  margin:0 auto 14px;
  position:relative;
  animation:iconPop 0.7s cubic-bezier(.34,1.56,.64,1) 0.2s both;
}
@keyframes iconPop{from{transform:scale(0.4) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

.logo-ring::before{
  content:'';
  position:absolute;inset:-3px;
  border-radius:24px;
  background:conic-gradient(
    rgb(255,30,85) 0%,
    rgb(255,120,0) 25%,
    rgb(0,230,255) 50%,
    rgb(160,80,255) 75%,
    rgb(255,30,85) 100%
  );
  animation:ringRotate 3s linear infinite;
}
@keyframes ringRotate{to{transform:rotate(360deg)}}

.logo-inner{
  position:absolute;inset:3px;
  background:var(--bg3);
  border-radius:19px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;z-index:1;
}

.title{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(2.4rem,9vw,4rem);
  letter-spacing:0.08em;line-height:1;
  background:linear-gradient(135deg,#fff 0%,rgb(255,120,160) 40%,rgb(255,30,85) 70%,rgb(180,0,60) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 28px rgba(255,30,85,0.4));
}

.subtitle{
  font-size:0.68rem;color:var(--text3);
  letter-spacing:0.38em;margin-top:5px;
  font-weight:600;text-transform:uppercase;
}

/* Animated RGB badge borders */
.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:14px}

.badge{
  position:relative;
  display:inline-flex;align-items:center;
  font-size:0.63rem;letter-spacing:0.1em;
  padding:1px;border-radius:22px;
  background:linear-gradient(90deg,rgb(255,30,85),rgb(0,230,255),rgb(160,80,255),rgb(255,30,85));
  background-size:300% 100%;
  animation:badgeBorder 5s linear infinite;
}
@keyframes badgeBorder{to{background-position:-300% 0}}

.badge-inner{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:4px 13px;
  color:var(--text2);
  font-weight:700;
  white-space:nowrap;
  text-transform:uppercase;
  backdrop-filter:blur(4px);
}

/* ═══════════════════════
   CARD
═══════════════════════ */
.card{
  background:var(--bg3);
  border:1px solid var(--borderW);
  border-radius:24px;
  padding:30px 22px;
  width:100%;max-width:600px;
  box-shadow:
    0 0 0 1px rgba(255,30,85,0.05),
    0 30px 80px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.06);
  animation:fadeUp 0.8s cubic-bezier(.16,1,.3,1) 0.1s both;
  position:relative;overflow:hidden;z-index:2;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}

/* Animated top border */
.card-border{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgb(255,30,85) 20%,rgb(0,230,255) 50%,rgb(160,80,255) 80%,transparent);
  background-size:200% 100%;
  animation:borderSlide 4s linear infinite;
}
@keyframes borderSlide{from{background-position:200% 0}to{background-position:-200% 0}}

/* Section labels */
.s-label{
  font-size:0.65rem;font-weight:700;
  letter-spacing:0.22em;color:var(--text3);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.s-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.07),transparent)}

/* ── INPUT ── */
.input-wrap{position:relative;margin-bottom:18px}

.url-input{
  width:100%;
  padding:15px 56px 15px 18px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.45);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:0.95rem;font-weight:500;
  outline:none;
  transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;
  -webkit-appearance:none;
}
.url-input:focus{
  border-color:rgba(255,30,85,0.6);
  background:rgba(255,30,85,0.04);
  box-shadow:0 0 0 3px rgba(255,30,85,0.12),0 0 20px rgba(255,30,85,0.08);
}
.url-input::placeholder{color:rgba(255,255,255,0.16)}

.paste-btn{
  position:absolute;right:10px;top:50%;
  transform:translateY(-50%);
  background:rgba(255,30,85,0.1);
  border:1px solid rgba(255,30,85,0.2);
  border-radius:9px;
  color:var(--pink-l);
  font-size:1.05rem;cursor:pointer;
  transition:all 0.2s;
  padding:6px 9px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.paste-btn:hover{
  background:rgba(255,30,85,0.2);
  transform:translateY(-50%) scale(1.08);
  box-shadow:0 0 12px rgba(255,30,85,0.25);
}

/* ── QUALITY ── */
.quality-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}

.quality-btn{
  padding:12px 6px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02);
  color:var(--text3);
  font-family:'Outfit',sans-serif;
  font-size:0.75rem;font-weight:700;
  letter-spacing:0.06em;cursor:pointer;
  transition:all 0.22s;text-align:center;line-height:1.4;
}
.quality-btn .q-icon{font-size:1.25rem;display:block;margin-bottom:4px}

.q-hd{border-color:rgba(255,30,85,0.5)!important;background:rgba(255,30,85,0.1)!important;color:var(--pink-l)!important;box-shadow:0 0 20px rgba(255,30,85,0.15),inset 0 1px 0 rgba(255,30,85,0.1)!important}
.q-normal{border-color:rgba(0,230,255,0.4)!important;background:rgba(0,230,255,0.08)!important;color:var(--cyan)!important;box-shadow:0 0 20px rgba(0,230,255,0.12)!important}
.q-audio{border-color:rgba(160,80,255,0.4)!important;background:rgba(160,80,255,0.08)!important;color:var(--purple)!important;box-shadow:0 0 20px rgba(160,80,255,0.12)!important}
.quality-btn:hover:not(.q-hd):not(.q-normal):not(.q-audio){border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--text2)}

/* ── MAIN BUTTON ── */
.btn-main{
  width:100%;padding:17px;border-radius:14px;border:none;
  background:linear-gradient(135deg,rgb(255,30,85) 0%,rgb(180,0,50) 100%);
  color:white;
  font-family:'Bebas Neue',cursive;
  font-size:1.2rem;letter-spacing:0.14em;
  cursor:pointer;
  transition:transform 0.25s,box-shadow 0.25s,opacity 0.25s;
  box-shadow:0 4px 28px rgba(255,30,85,0.4),0 0 0 1px rgba(255,30,85,0.1);
  position:relative;overflow:hidden;
}
.btn-main::before{
  content:'';position:absolute;
  top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transform:skewX(-20deg);transition:left 0.6s ease;
}
.btn-main:hover::before{left:160%}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(255,30,85,0.55)}
.btn-main:active{transform:translateY(0)}
.btn-main:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ── PROGRESS ── */
.progress-wrap{display:none;margin-top:14px;height:3px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;width:0%;border-radius:10px;background:linear-gradient(90deg,rgb(255,30,85),rgb(0,230,255),rgb(160,80,255));background-size:200% 100%;transition:width 0.35s ease;animation:pgShimmer 2s linear infinite}
@keyframes pgShimmer{to{background-position:-200% 0}}

/* ── STATUS ── */
.status-box{display:none;margin-top:16px;padding:14px 18px;border-radius:13px;font-weight:600;font-size:0.88rem;line-height:1.55;animation:fadeUp 0.3s ease}
.s-loading{background:rgba(255,180,0,0.06);border:1px solid rgba(255,180,0,0.2);color:rgb(255,195,60)}
.s-ok{background:rgba(0,230,255,0.05);border:1px solid rgba(0,230,255,0.2);color:var(--cyan)}
.s-error{background:rgba(255,30,85,0.06);border:1px solid rgba(255,30,85,0.2);color:var(--pink-l)}

/* ── RESULT ── */
.result-box{display:none;margin-top:18px;background:var(--bg4);border:1px solid rgba(255,255,255,0.07);border-radius:18px;overflow:hidden;animation:fadeUp 0.5s cubic-bezier(.16,1,.3,1)}

.thumb-wrap{width:100%;aspect-ratio:16/9;background:var(--bg);overflow:hidden;position:relative}
.thumb-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
.thumb-img:hover{transform:scale(1.03)}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 50%);pointer-events:none}
.thumb-tag{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,30,85,0.45);color:var(--pink-l);font-size:0.63rem;font-weight:700;letter-spacing:0.1em;padding:3px 10px;border-radius:20px;backdrop-filter:blur(8px);text-transform:uppercase}

.result-body{padding:18px 18px 20px}
.result-title{font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.meta-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.meta-chip{font-size:0.7rem;font-weight:600;letter-spacing:0.06em;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);padding:4px 10px;border-radius:7px;color:var(--text2)}
.meta-chip b{color:var(--pink-l)}

/* Download buttons */
.dl-grid{display:flex;flex-direction:column;gap:10px}

.dl-btn{
  width:100%;padding:15px 18px;border-radius:12px;border:none;
  cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:0.88rem;font-weight:700;letter-spacing:0.05em;
  transition:transform 0.2s,box-shadow 0.2s,opacity 0.2s;
  display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.dl-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transform:translateX(-100%);transition:transform 0.5s ease}
.dl-btn:hover::after{transform:translateX(100%)}
.dl-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.dl-btn-hd{background:linear-gradient(135deg,rgb(255,30,85) 0%,rgb(190,0,55) 100%);color:white;box-shadow:0 4px 22px rgba(255,30,85,0.35)}
.dl-btn-hd:hover{transform:translateY(-2px);box-shadow:0 7px 30px rgba(255,30,85,0.5)}

.dl-btn-normal{background:rgba(0,230,255,0.07);border:1px solid rgba(0,230,255,0.25);color:var(--cyan)}
.dl-btn-normal:hover{background:rgba(0,230,255,0.13);transform:translateY(-1px)}

.dl-btn-audio{background:rgba(160,80,255,0.07);border:1px solid rgba(160,80,255,0.25);color:var(--purple)}
.dl-btn-audio:hover{background:rgba(160,80,255,0.13);transform:translateY(-1px)}

.mobile-tip{margin-top:13px;padding:12px 14px;background:rgba(255,170,0,0.05);border:1px solid rgba(255,170,0,0.15);border-left:3px solid rgba(255,170,0,0.4);border-radius:10px;font-size:0.78rem;color:rgba(255,185,50,0.8);line-height:1.7}

/* ── FEATURES ── */
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:24px}
.feature{text-align:center;padding:15px 8px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-radius:14px;transition:all 0.25s;cursor:default}
.feature:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,30,85,0.18);transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,30,85,0.08)}
.feature-icon{font-size:1.5rem;display:block;margin-bottom:6px}
.feature-text{font-size:0.62rem;color:var(--text3);letter-spacing:0.06em;font-weight:700;line-height:1.5;text-transform:uppercase}

/* ── FOOTER ── */
.footer{margin-top:28px;text-align:center;position:relative;z-index:2;animation:fadeUp 0.8s ease 0.5s both}
.footer-text{font-size:0.7rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3)}
.footer-brand{display:inline-block;font-family:'Bebas Neue',cursive;font-size:1.05rem;letter-spacing:0.14em;background:linear-gradient(90deg,rgb(255,30,85),rgb(0,230,255),rgb(160,80,255),rgb(255,30,85));background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:brandFlow 5s linear infinite}
@keyframes brandFlow{to{background-position:-300% 0}}

/* ── SPINNER ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,180,0,0.2);border-top-color:rgb(255,195,60);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:7px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MISC ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(255,30,85,0.3);border-radius:4px}
::selection{background:rgba(255,30,85,0.3);color:white}
</style>
</head>
<body>

<!-- Background -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- HEADER -->
<header class="header">
  <div class="logo-ring">
    <div class="logo-inner">🎵</div>
  </div>
  <div class="title">TikTok Downloader</div>
  <div class="subtitle">The Cris IF Edition</div>
  <div class="badges">
    <span class="badge"><span class="badge-inner">🚫 Sin marca de agua</span></span>
    <span class="badge"><span class="badge-inner">🎬 HD &amp; 4K</span></span>
    <span class="badge"><span class="badge-inner">🎵 Audio MP3</span></span>
    <span class="badge"><span class="badge-inner">⚡ Gratis</span></span>
  </div>
</header>

<!-- CARD -->
<main class="card">
  <div class="card-border"></div>

  <div class="s-label">🔗 Enlace del video</div>
  <div class="input-wrap">
    <input
      class="url-input" id="url-input"
      type="url" inputmode="url"
      autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="https://www.tiktok.com/@usuario/video/..."
      onkeydown="if(event.key==='Enter'){event.preventDefault();descargar()}"
    />
    <button class="paste-btn" id="paste-btn" type="button" title="Pegar enlace">📋</button>
  </div>

  <div class="s-label">⚙️ Calidad</div>
  <div class="quality-grid">
    <button class="quality-btn q-hd" data-q="hd" type="button">
      <span class="q-icon">🔥</span>HD / 4K
    </button>
    <button class="quality-btn" data-q="normal" type="button">
      <span class="q-icon">📹</span>Normal
    </button>
    <button class="quality-btn" data-q="audio" type="button">
      <span class="q-icon">🎵</span>Solo Audio
    </button>
  </div>

  <button class="btn-main" id="btn-main" type="button">⬇️ OBTENER VIDEO</button>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="status-box" id="status-box"></div>
  <div class="result-box"  id="result-box"></div>

  <div class="features">
    <div class="feature"><span class="feature-icon">🚫</span><div class="feature-text">Sin marca<br>de agua</div></div>
    <div class="feature"><span class="feature-icon">📲</span><div class="feature-text">HD &amp; 4K<br>calidad</div></div>
    <div class="feature"><span class="feature-icon">⚡</span><div class="feature-text">Rápido<br>y gratis</div></div>
  </div>
</main>

<footer class="footer">
  <div class="footer-text">Hecho con ❤️ por</div>
  <div class="footer-brand">THE CRIS IF</div>
</footer>

<script>
'use strict';

/* ─────────── State ─────────── */
let selectedQ  = 'hd';
let isWorking  = false;

/* ─────────── Quality map ─────────── */
const Q_CLASS = { hd:'q-hd', normal:'q-normal', audio:'q-audio' };

/* ─────────── Init: bind events ─────────── */
document.addEventListener('DOMContentLoaded', function () {

  /* Quality buttons */
  document.querySelectorAll('.quality-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.quality-btn').forEach(function (b) {
        b.classList.remove('q-hd', 'q-normal', 'q-audio');
      });
      selectedQ = btn.dataset.q;
      btn.classList.add(Q_CLASS[selectedQ]);
    });
  });

  /* Paste button */
  document.getElementById('paste-btn').addEventListener('click', pegar);

  /* Main download button */
  document.getElementById('btn-main').addEventListener('click', descargar);
});

/* ─────────── Paste ─────────── */
async function pegar() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) document.getElementById('url-input').value = text.trim();
  } catch (e) {
    document.getElementById('url-input').select();
  }
}

/* ─────────── UI helpers ─────────── */
function setStatus(type, html) {
  var el = document.getElementById('status-box');
  el.className = 'status-box s-' + type;
  el.innerHTML = html;
  el.style.display = 'block';
}

function clearStatus() {
  var el = document.getElementById('status-box');
  el.style.display = 'none';
  el.innerHTML = '';
}

function setProgress(pct) {
  var wrap = document.getElementById('progress-wrap');
  var fill = document.getElementById('progress-fill');
  if (pct === null) {
    wrap.style.display = 'none';
    fill.style.width = '0%';
  } else {
    wrap.style.display = 'block';
    fill.style.width = pct + '%';
  }
}

/* ─────────── Escape HTML ─────────── */
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ─────────── Build filename ─────────── */
function buildName(data, tipo) {
  var uid = (data.author && data.author.unique_id) ? data.author.unique_id : 'tiktok';
  var ext = tipo === 'audio' ? 'mp3' : 'mp4';
  var safe = uid.replace(/[^a-z0-9_\-]/gi, '_').substring(0, 28);
  return 'crisif_' + safe + '_' + Date.now() + '.' + ext;
}

/* ─────────── Proxy URLs para evitar CORS y archivos corruptos ─────────── */
function proxyUrl(url) {
  // Usamos allorigins como proxy para forzar headers correctos
  return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
}

/* ─────────── Descarga con múltiples métodos ─────────── */
async function downloadBlob(url, filename, btnEl) {
  if (!url || !btnEl) return;
  var origHTML = btnEl.innerHTML;

  btnEl.disabled = true;
  btnEl.innerHTML = '<span class="spinner"></span> Descargando...';
  setProgress(10);

  var isAudio = filename.endsWith('.mp3');
  var mime    = isAudio ? 'audio/mpeg' : 'video/mp4';

  /* ── Método 1: fetch directo ── */
  async function metodo1() {
    var r = await fetch(url, { mode: 'cors' });
    if (!r.ok) throw new Error('m1 ' + r.status);
    setProgress(50);
    var b = await r.blob();
    return new Blob([b], { type: mime });
  }

  /* ── Método 2: fetch via proxy (fix archivos corruptos en Android) ── */
  async function metodo2() {
    var r = await fetch(proxyUrl(url));
    if (!r.ok) throw new Error('m2 ' + r.status);
    setProgress(50);
    var b = await r.blob();
    return new Blob([b], { type: mime });
  }

  /* ── Método 3: link directo con tikwm download endpoint ── */
  async function metodo3() {
    // tikwm tiene un endpoint /download que sirve con headers correctos
    var dl = 'https://www.tikwm.com/video/media/hdplay/' +
             url.split('/').pop().split('?')[0] + '.mp4';
    var r = await fetch(dl, { mode: 'cors' });
    if (!r.ok) throw new Error('m3 ' + r.status);
    setProgress(50);
    var b = await r.blob();
    return new Blob([b], { type: mime });
  }

  var blob = null;
  var methods = [metodo1, metodo2, metodo3];

  for (var i = 0; i < methods.length; i++) {
    try {
      blob = await methods[i]();
      if (blob && blob.size > 1000) break; // blob válido
    } catch(e) { blob = null; }
  }

  setProgress(90);

  if (blob && blob.size > 1000) {
    /* Guardar como archivo */
    var blobUrl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href        = blobUrl;
    a.download    = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    }, 10000);

    setProgress(100);
    setTimeout(function () { setProgress(null); }, 1500);
    btnEl.innerHTML = '✅ ¡Guardado!';
    setTimeout(function () { btnEl.innerHTML = origHTML; btnEl.disabled = false; }, 3500);

  } else {
    /* Último recurso: abrir en nueva pestaña */
    setProgress(null);
    window.open(url, '_blank');
    btnEl.innerHTML = '🔗 Abierto en navegador';
    setTimeout(function () { btnEl.innerHTML = origHTML; btnEl.disabled = false; }, 3000);
  }
}

/* ─────────── Render result ─────────── */
function renderResult(data) {
  var hdUrl    = data.hdplay    || data.play         || '';
  var normUrl  = data.play      || data.hdplay       || '';
  var audioUrl = data.music     || data.wmplay       || '';
  var thumbUrl = data.cover     || data.origin_cover || '';

  var titleSafe = esc(data.title || 'Video de TikTok');
  var nick      = esc((data.author && data.author.nickname)  || '');
  var uid       = esc((data.author && data.author.unique_id) || '');
  var dur       = data.duration   ? data.duration + 's'                              : '';
  var plays     = data.play_count  ? '▶ ' + Number(data.play_count).toLocaleString() : '';
  var likes     = data.digg_count  ? '❤️ ' + Number(data.digg_count).toLocaleString(): '';

  /* Thumb */
  var thumbHTML = thumbUrl
    ? '<div class="thumb-wrap">' +
        '<img class="thumb-img" src="' + esc(thumbUrl) + '" alt="Miniatura" loading="lazy" onerror="this.closest(\'.thumb-wrap\').style.display=\'none\'">' +
        '<div class="thumb-overlay"></div>' +
        '<span class="thumb-tag">📹 TikTok</span>' +
      '</div>'
    : '';

  /* Meta chips */
  var chips = [
    uid   ? '<span class="meta-chip">👤 <b>@' + uid + '</b></span>'  : '',
    dur   ? '<span class="meta-chip">⏱ <b>' + dur + '</b></span>'    : '',
    plays ? '<span class="meta-chip">' + plays + '</span>'             : '',
    likes ? '<span class="meta-chip">' + likes + '</span>'             : '',
  ].filter(Boolean).join('');

  /* DL buttons — use data-* attributes for URLs (no inline JS with URLs) */
  var hdBtn = hdUrl
    ? '<button class="dl-btn dl-btn-hd" data-url="' + esc(hdUrl) + '" data-name="' + esc(buildName(data,'hd')) + '">🔥 Descargar HD / Alta Calidad</button>'
    : '';

  var normBtn = (normUrl && normUrl !== hdUrl)
    ? '<button class="dl-btn dl-btn-normal" data-url="' + esc(normUrl) + '" data-name="' + esc(buildName(data,'normal')) + '">📹 Descargar Calidad Normal</button>'
    : '';

  var audioBtn = audioUrl
    ? '<button class="dl-btn dl-btn-audio" data-url="' + esc(audioUrl) + '" data-name="' + esc(buildName(data,'audio')) + '">🎵 Descargar Solo Audio (MP3)</button>'
    : '';

  var box = document.getElementById('result-box');
  box.innerHTML =
    thumbHTML +
    '<div class="result-body">' +
      '<div class="result-title">' + titleSafe + '</div>' +
      (chips ? '<div class="meta-row">' + chips + '</div>' : '') +
      '<div class="dl-grid">' + hdBtn + normBtn + audioBtn + '</div>' +
      '<div class="mobile-tip">📲 <b>¿No se descarga automáticamente?</b><br>Toca el botón → el video se abre → mantén presionado → "Guardar video"</div>' +
    '</div>';
  box.style.display = 'block';

  /* Bind download listeners */
  box.querySelectorAll('.dl-btn[data-url]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      downloadBlob(this.dataset.url, this.dataset.name, this);
    });
  });

  /* Auto-trigger audio if selected */
  if (selectedQ === 'audio') {
    var ab = box.querySelector('.dl-btn-audio');
    if (ab) setTimeout(function () { ab.click(); }, 400);
  }
}

/* ─────────── Main fetch ─────────── */
async function descargar() {
  if (isWorking) return;

  var rawUrl = document.getElementById('url-input').value.trim();
  var btn    = document.getElementById('btn-main');

  if (!rawUrl) {
    setStatus('error', '❌ Pega un enlace de TikTok primero');
    return;
  }

  if (!/tiktok\.com|vm\.tiktok|vt\.tiktok/i.test(rawUrl)) {
    setStatus('error', '❌ El enlace debe ser de TikTok (tiktok.com)');
    return;
  }

  /* Lock */
  isWorking    = true;
  btn.disabled = true;
  document.getElementById('result-box').style.display = 'none';
  setProgress(null);
  setStatus('loading', '<span class="spinner"></span> Obteniendo video en alta calidad...');

  try {
    var form = new FormData();
    form.append('url', rawUrl);
    form.append('hd',  '1');

    var resp = await fetch('https://www.tikwm.com/api/', { method:'POST', body:form });
    if (!resp.ok) throw new Error('API HTTP ' + resp.status);

    var json = await resp.json();

    if (json.code === 0 && json.data) {
      setStatus('ok', '✅ Video encontrado — elige la calidad y descarga');
      renderResult(json.data);
    } else {
      setStatus('error', '❌ No se pudo obtener el video. Prueba con otro enlace.<br><small style="opacity:.65">' + esc(json.msg || '') + '</small>');
    }

  } catch (err) {
    setStatus('error', '❌ Error de conexión. Verifica tu internet e intenta de nuevo.');
  }

  /* Unlock */
  isWorking    = false;
  btn.disabled = false;
}
</script>
