<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok DL — THE CRIS IF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --a: #ff6b00;
  --a2: #ff9a00;
  --a3: #ffcc44;
  --b: #7c3aed;
  --b2: #a855f7;
  --c: #06b6d4;
  --bg:  #08080f;
  --bg2: #0f0f1a;
  --bg3: #161625;
  --bg4: #1c1c30;
  --line: rgba(255,255,255,0.06);
  --txt:  rgba(255,255,255,0.93);
  --txt2: rgba(255,255,255,0.48);
  --txt3: rgba(255,255,255,0.18);
  --r: 16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--txt);
  display:flex;flex-direction:column;align-items:center;
  padding:36px 16px 100px;
  overflow-x:hidden;
}

/* ── FONDO AMBIANCE ── */
.bg-orb{
  position:fixed;pointer-events:none;border-radius:50%;filter:blur(80px);z-index:0;
}
.bg-orb-1{
  width:420px;height:420px;
  top:-120px;left:-80px;
  background:radial-gradient(circle,rgba(124,58,237,0.18),transparent 70%);
  animation:drift1 12s ease-in-out infinite alternate;
}
.bg-orb-2{
  width:340px;height:340px;
  top:40%;right:-60px;
  background:radial-gradient(circle,rgba(255,107,0,0.14),transparent 70%);
  animation:drift2 10s ease-in-out infinite alternate;
}
.bg-orb-3{
  width:280px;height:280px;
  bottom:10%;left:10%;
  background:radial-gradient(circle,rgba(6,182,212,0.1),transparent 70%);
  animation:drift1 14s ease-in-out infinite alternate-reverse;
}
@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(30px,20px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(-25px,15px)}}

/* Noise overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025;pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.header{
  position:relative;z-index:2;
  text-align:center;margin-bottom:36px;
  animation:fadeDown .8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

.logo{
  width:72px;height:72px;margin:0 auto 16px;
  position:relative;
  animation:popIn .7s cubic-bezier(.34,1.56,.64,1) .15s both;
}
@keyframes popIn{from{transform:scale(.3) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

.logo-bg{
  position:absolute;inset:0;border-radius:22px;
  background:linear-gradient(135deg,var(--b) 0%,var(--a) 50%,var(--a3) 100%);
  animation:spinSlow 8s linear infinite;
}
@keyframes spinSlow{to{filter:hue-rotate(360deg)}}

.logo-face{
  position:absolute;inset:3px;border-radius:18px;
  background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;z-index:1;
}

.brand{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.6rem,10vw,4.2rem);
  font-weight:800;
  line-height:.95;
  letter-spacing:-.02em;
  background:linear-gradient(120deg,#fff 0%,var(--a3) 35%,var(--a) 60%,var(--b2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 32px rgba(255,107,0,.3));
}

.tagline{
  margin-top:6px;
  font-size:.72rem;font-weight:600;
  letter-spacing:.3em;text-transform:uppercase;
  color:var(--txt3);
}

.pills{
  display:flex;flex-wrap:wrap;justify-content:center;gap:7px;
  margin-top:16px;
}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:100px;
  font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.04);
  color:var(--txt2);
  transition:all .2s;
}
.pill:hover{border-color:rgba(255,107,0,.35);color:var(--a2)}

/* ── CARD ── */
.card{
  position:relative;z-index:2;
  width:100%;max-width:580px;
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:24px;
  padding:28px 22px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.03) inset,
    0 40px 100px rgba(0,0,0,.6),
    0 0 60px rgba(124,58,237,.07);
  animation:fadeUp .9s cubic-bezier(.16,1,.3,1) .05s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* animated top border */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:24px 24px 0 0;
  background:linear-gradient(90deg,transparent,var(--b2) 20%,var(--a) 50%,var(--a3) 80%,transparent);
  background-size:200% 100%;
  animation:borderSlide 3s linear infinite;
}
@keyframes borderSlide{from{background-position:200% 0}to{background-position:-200% 0}}

.field-label{
  font-size:.64rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.field-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.06),transparent)}

/* ── INPUT ── */
.input-row{position:relative;margin-bottom:14px}

.url-input{
  width:100%;
  padding:15px 52px 15px 18px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.4);
  color:var(--txt);
  font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;
  outline:none;
  transition:border-color .25s,box-shadow .25s,background .25s;
  -webkit-appearance:none;
}
.url-input:focus{
  border-color:rgba(255,107,0,.5);
  background:rgba(255,107,0,.04);
  box-shadow:0 0 0 3px rgba(255,107,0,.12),0 0 20px rgba(255,107,0,.08);
}
.url-input::placeholder{color:rgba(255,255,255,.14)}

.paste-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.22);
  border-radius:9px;color:var(--a2);font-size:.95rem;cursor:pointer;
  padding:6px 9px;line-height:1;
  transition:all .2s;
}
.paste-btn:hover{background:rgba(255,107,0,.22);transform:translateY(-50%) scale(1.1)}

/* ── BTN PRINCIPAL ── */
.btn-main{
  width:100%;padding:16px;border-radius:14px;border:none;
  font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:#fff;
  background:linear-gradient(135deg,var(--b) 0%,var(--a) 60%,var(--a2) 100%);
  background-size:200% 100%;
  transition:all .3s;
  box-shadow:0 4px 28px rgba(255,107,0,.3),0 0 0 1px rgba(255,255,255,.06) inset;
  position:relative;overflow:hidden;
}
.btn-main::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  opacity:0;transition:opacity .2s;
}
.btn-main:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 40px rgba(255,107,0,.45),0 0 0 1px rgba(255,255,255,.1) inset;
  background-position:100% 0;
}
.btn-main:hover::after{opacity:1}
.btn-main:active{transform:translateY(0)}
.btn-main:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none}

/* ── STATUS ── */
.status-box{
  display:none;margin-top:14px;
  padding:13px 16px;border-radius:12px;
  font-size:.88rem;font-weight:600;line-height:1.6;
  animation:fadeUp .3s ease;
}
.s-loading{background:rgba(255,204,68,.06);border:1px solid rgba(255,204,68,.18);color:#ffd666}
.s-ok{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);color:var(--c)}
.s-error{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.2);color:var(--a2)}

.api-status{
  display:none;margin-top:8px;padding:7px 12px;border-radius:9px;
  font-size:.7rem;font-weight:600;letter-spacing:.04em;
  background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.18);
  color:var(--b2);
}

/* ── PROGRESS ── */
.progress-wrap{
  display:none;margin-top:10px;
  height:3px;border-radius:99px;
  background:rgba(255,255,255,.06);overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--b2),var(--a),var(--a3));
  background-size:200% 100%;
  transition:width .4s ease;width:0%;
  animation:shimmer 2s linear infinite;
}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* ── FEATURES ── */
.features{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-top:20px;
}
.feat{
  text-align:center;padding:14px 8px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
  border-radius:14px;
  transition:border-color .2s,background .2s;
}
.feat:hover{border-color:rgba(255,107,0,.2);background:rgba(255,107,0,.03)}
.feat-icon{font-size:1.5rem;display:block;margin-bottom:5px}
.feat-txt{font-size:.6rem;color:var(--txt3);letter-spacing:.08em;font-weight:700;
  line-height:1.55;text-transform:uppercase}

/* ── RESULT ── */
.result-box{
  display:none;margin-top:18px;
  border:1px solid rgba(255,255,255,.07);
  border-radius:18px;overflow:hidden;
  background:rgba(0,0,0,.25);
  animation:fadeUp .5s cubic-bezier(.16,1,.3,1);
}
.thumb-wrap{
  position:relative;width:100%;aspect-ratio:16/9;
  background:var(--bg3);overflow:hidden;
}
.thumb-img{width:100%;height:100%;object-fit:cover;display:block;opacity:.85;
  transition:opacity .3s}
.thumb-img:hover{opacity:1}
.thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(8,8,15,.8) 0%,transparent 55%);
}
.thumb-badge{
  position:absolute;bottom:12px;left:14px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);border-radius:8px;
  padding:4px 11px;font-size:.66rem;font-weight:700;letter-spacing:.1em;
  color:rgba(255,255,255,.75);text-transform:uppercase;
}

.result-body{padding:18px 20px}

.result-title{
  font-family:'DM Sans',sans-serif;
  font-size:.96rem;font-weight:700;color:var(--txt);
  margin-bottom:12px;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{
  font-size:.68rem;color:var(--txt2);font-weight:600;letter-spacing:.05em;
  background:rgba(255,255,255,.04);padding:4px 11px;border-radius:8px;
  border:1px solid rgba(255,255,255,.07);
}
.chip b{color:var(--a2)}

/* ── BOTONES DESCARGA ── */
.dl-grid{display:flex;flex-direction:column;gap:9px}

.dl-btn{
  width:100%;padding:14px 16px;
  border-radius:12px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:700;
  transition:all .2s;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.dl-btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}

.dl-4k{
  background:linear-gradient(135deg,rgba(255,107,0,.2),rgba(124,58,237,.15));
  border:1px solid rgba(255,107,0,.4);color:#fff;
  box-shadow:0 0 24px rgba(255,107,0,.1);
}
.dl-4k:hover{
  background:linear-gradient(135deg,rgba(255,107,0,.32),rgba(124,58,237,.25));
  transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,107,0,.28);
}
.dl-hd{
  background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.3);color:var(--c);
}
.dl-hd:hover{background:rgba(6,182,212,.14);transform:translateY(-1px)}

.dl-normal{
  background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.28);color:var(--b2);
}
.dl-normal:hover{background:rgba(168,85,247,.14);transform:translateY(-1px)}

.dl-audio{
  background:rgba(255,204,68,.07);border:1px solid rgba(255,204,68,.25);color:var(--a3);
}
.dl-audio:hover{background:rgba(255,204,68,.14);transform:translateY(-1px)}

.dl-left{display:flex;align-items:center;gap:11px}
.dl-icon{font-size:1.25rem;line-height:1;flex-shrink:0}
.dl-title{display:block;font-size:.85rem;font-weight:700}
.dl-sub{display:block;font-size:.67rem;opacity:.5;font-weight:500;margin-top:2px}
.dl-arr{font-size:.8rem;opacity:.4;flex-shrink:0}

/* TIP */
.tip{
  margin-top:13px;padding:12px 14px;
  background:rgba(255,204,68,.04);
  border:1px solid rgba(255,204,68,.1);
  border-radius:10px;
  font-size:.77rem;color:rgba(255,190,50,.7);line-height:1.8;
}

/* SPINNER */
.sp{
  display:inline-block;width:13px;height:13px;
  border:2px solid rgba(255,204,68,.2);border-top-color:var(--a3);
  border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:7px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{
  position:relative;z-index:2;
  margin-top:28px;text-align:center;
  font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.1);
}
.footer span{color:var(--a)}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="header">
  <div class="logo">
    <div class="logo-bg"></div>
    <div class="logo-face">🎵</div>
  </div>
  <div class="brand">TikTok DL</div>
  <div class="tagline">The Cris IF Edition</div>
  <div class="pills">
    <div class="pill">🔥 4K &amp; HD</div>
    <div class="pill">🚫 Sin marca</div>
    <div class="pill">🎵 MP3</div>
    <div class="pill">⚡ Gratis</div>
  </div>
</div>

<div class="card">
  <div class="field-label">🔗 Enlace del video</div>
  <div class="input-row">
    <input class="url-input" id="url-input" type="text"
      placeholder="https://www.tiktok.com/@usuario/video/..."
      onkeydown="if(event.key==='Enter')buscar()">
    <button class="paste-btn" onclick="pegar()" title="Pegar">📋</button>
  </div>

  <button class="btn-main" id="btn-main" onclick="buscar()">
    ⬇️ &nbsp;Obtener Video
  </button>

  <div class="status-box" id="status-box"></div>
  <div class="api-status"  id="api-status"></div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="result-box" id="result-box"></div>

  <div class="features">
    <div class="feat"><span class="feat-icon">🚫</span><div class="feat-txt">Sin marca<br>de agua</div></div>
    <div class="feat"><span class="feat-icon">🔥</span><div class="feat-txt">4K / HD<br>calidad</div></div>
    <div class="feat"><span class="feat-icon">⚡</span><div class="feat-txt">Rápido<br>y gratis</div></div>
  </div>
</div>

<div class="footer">Hecho con ❤️ por <span>THE CRIS IF</span></div>

<script>
var working = false;

var APIS = [
  {
    nombre: 'tikwm.com',
    call: async function(url) {
      var form = new FormData();
      form.append('url', url);
      form.append('hd', '1');
      var r = await fetch('https://www.tikwm.com/api/', { method:'POST', body:form });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var j = await r.json();
      if (j.code !== 0 || !j.data) throw new Error('Sin datos');
      return normalizar_tikwm(j.data);
    }
  },
  {
    nombre: 'tikwm.com (sin HD)',
    call: async function(url) {
      var form = new FormData();
      form.append('url', url);
      var r = await fetch('https://www.tikwm.com/api/', { method:'POST', body:form });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var j = await r.json();
      if (j.code !== 0 || !j.data) throw new Error('Sin datos');
      return normalizar_tikwm(j.data);
    }
  },
  {
    nombre: 'tikwm via proxy',
    call: async function(url) {
      var body = 'url=' + encodeURIComponent(url) + '&hd=1';
      var apiUrl = 'https://www.tikwm.com/api/';
      var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
      var r = await fetch(proxyUrl, {
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: body
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var j = await r.json();
      if (j.code !== 0 || !j.data) throw new Error('Sin datos');
      return normalizar_tikwm(j.data);
    }
  },
  {
    nombre: 'savetik.net',
    call: async function(url) {
      var r = await fetch('https://savetik.net/api/ajaxSearch', {
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'q=' + encodeURIComponent(url) + '&lang=es'
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var j = await r.json();
      if (j.status !== 'ok' || !j.data) throw new Error('Sin datos');
      return normalizar_savetik(j.data);
    }
  },
  {
    nombre: 'musicaldown',
    call: async function(url) {
      var r0 = await fetch('https://musicaldown.com/es/', {mode:'cors'});
      var html = await r0.text();
      var m = html.match(/name="([^"]+)"\s+value="([^"]+)"/g);
      if (!m || m.length < 2) throw new Error('Sin token');
      var fields = {};
      m.forEach(function(s){
        var kv = s.match(/name="([^"]+)"\s+value="([^"]*)"/);
        if(kv) fields[kv[1]] = kv[2];
      });
      var body = Object.keys(fields).map(function(k){
        return encodeURIComponent(k)+'='+encodeURIComponent(fields[k]);
      }).join('&');
      body += '&link=' + encodeURIComponent(url);
      var r = await fetch('https://musicaldown.com/download', {
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: body
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var html2 = await r.text();
      return normalizar_musicaldown(html2);
    }
  }
];

function normalizar_tikwm(d) {
  return {
    titulo:  d.title || 'Video de TikTok',
    autor:   (d.author && d.author.unique_id) ? d.author.unique_id : '',
    thumb:   d.cover || d.origin_cover || '',
    duracion: d.duration ? d.duration + 's' : '',
    plays:   d.play_count  ? Number(d.play_count).toLocaleString()  : '',
    likes:   d.digg_count  ? Number(d.digg_count).toLocaleString()  : '',
    url_4k:    d.hdplay  || '',
    url_hd:    d.play    || '',
    url_normal: d.wmplay || '',
    url_audio:  d.music  || (d.music_info && d.music_info.play) || ''
  };
}
function normalizar_savetik(html) {
  var dp = new DOMParser();
  var doc = dp.parseFromString(html, 'text/html');
  var links = Array.from(doc.querySelectorAll('a[href]'))
    .map(function(a){ return a.href; })
    .filter(function(h){ return h.includes('.mp4') || h.includes('video'); });
  var audios = Array.from(doc.querySelectorAll('a[href]'))
    .map(function(a){ return a.href; })
    .filter(function(h){ return h.includes('.mp3') || h.includes('audio') || h.includes('music'); });
  var img = doc.querySelector('img');
  var titulo = doc.querySelector('h2,h3,.title');
  return {
    titulo:  titulo ? titulo.textContent.trim() : 'Video de TikTok',
    autor:'',thumb: img ? img.src : '',
    duracion:'',plays:'',likes:'',
    url_4k:links[0]||'',url_hd:links[1]||links[0]||'',
    url_normal:links[2]||links[0]||'',url_audio:audios[0]||''
  };
}
function normalizar_musicaldown(html) {
  var dp = new DOMParser();
  var doc = dp.parseFromString(html, 'text/html');
  var links = Array.from(doc.querySelectorAll('a[href]'))
    .map(function(a){ return a.href; })
    .filter(function(h){ return h.startsWith('http') && (h.includes('.mp4') || h.includes('video')); });
  if (!links.length) throw new Error('Sin links en respuesta');
  var img = doc.querySelector('img.card-img,img');
  var titulo = doc.querySelector('.video-title,.title,h2');
  return {
    titulo:titulo ? titulo.textContent.trim() : 'Video de TikTok',
    autor:'',thumb:img ? img.src : '',
    duracion:'',plays:'',likes:'',
    url_4k:links[0]||'',url_hd:links[1]||links[0]||'',
    url_normal:links[0]||'',url_audio:''
  };
}

async function pegar() {
  try {
    var t = await navigator.clipboard.readText();
    if (t) document.getElementById('url-input').value = t.trim();
  } catch(e) { document.getElementById('url-input').select(); }
}

function setStatus(cls, html) {
  var el = document.getElementById('status-box');
  el.className = 'status-box ' + cls;
  el.innerHTML = html;
  el.style.display = 'block';
}
function setApiStatus(txt) {
  var el = document.getElementById('api-status');
  if (!txt) { el.style.display='none'; return; }
  el.textContent = txt; el.style.display = 'block';
}
function setProgress(v) {
  var w = document.getElementById('progress-wrap');
  var f = document.getElementById('progress-fill');
  if (v === null) { w.style.display='none'; f.style.width='0%'; return; }
  w.style.display='block'; f.style.width=v+'%';
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fname(autor, tipo) {
  var safe = (autor || 'tiktok').replace(/[^a-z0-9_-]/gi,'_').substring(0,24);
  return 'crisif_' + safe + '_' + Date.now() + (tipo==='audio' ? '.mp3' : '.mp4');
}

async function dlBlob(url, filename, btn) {
  if (!url || !btn) return;
  var origTitle = btn.querySelector('.dl-title').textContent;
  btn.disabled = true;
  btn.querySelector('.dl-title').textContent = '⏳ Descargando...';
  setProgress(15);
  var mime = filename.endsWith('.mp3') ? 'audio/mpeg' : 'video/mp4';
  var blob = null;
  try {
    var r = await fetch(url, { mode:'cors' });
    if (r.ok) { setProgress(50); var b = await r.blob(); if (b.size > 5000) blob = new Blob([b], { type:mime }); }
  } catch(e) {}
  if (!blob) {
    try {
      setProgress(35);
      var r2 = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
      if (r2.ok) { setProgress(65); var b2 = await r2.blob(); if (b2.size > 5000) blob = new Blob([b2], { type:mime }); }
    } catch(e) {}
  }
  if (!blob) {
    try {
      setProgress(45);
      var r3 = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
      if (r3.ok) { setProgress(75); var b3 = await r3.blob(); if (b3.size > 5000) blob = new Blob([b3], { type:mime }); }
    } catch(e) {}
  }
  setProgress(90);
  if (blob && blob.size > 5000) {
    var burl = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=burl; a.download=filename; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(burl); }, 15000);
    setProgress(100);
    setTimeout(function(){ setProgress(null); }, 1500);
    btn.querySelector('.dl-title').textContent = '✅ ¡Guardado!';
    setTimeout(function(){ btn.querySelector('.dl-title').textContent = origTitle; btn.disabled=false; }, 3500);
  } else {
    setProgress(null);
    window.open(url, '_blank');
    btn.querySelector('.dl-title').textContent = '🔗 Abierto — guardar manualmente';
    setTimeout(function(){ btn.querySelector('.dl-title').textContent = origTitle; btn.disabled=false; }, 4000);
  }
}

function mkBtn(cls, icon, title, sub, url, autor, tipo) {
  if (!url) return null;
  var n = fname(autor, tipo);
  var btn = document.createElement('button');
  btn.className = 'dl-btn ' + cls;
  btn.dataset.url = url; btn.dataset.name = n;
  btn.innerHTML =
    '<div class="dl-left">'
    + '<span class="dl-icon">'+icon+'</span>'
    + '<div><span class="dl-title">'+title+'</span><span class="dl-sub">'+sub+'</span></div>'
    + '</div><span class="dl-arr">⬇</span>';
  btn.addEventListener('click', function(){ dlBlob(this.dataset.url, this.dataset.name, this); });
  return btn;
}

function render(data, api_nombre) {
  var box = document.getElementById('result-box');
  box.innerHTML = '';
  if (data.thumb) {
    box.innerHTML =
      '<div class="thumb-wrap">'
      + '<img class="thumb-img" src="'+esc(data.thumb)+'" loading="lazy" '
      + 'onerror="this.closest(\'.thumb-wrap\').style.display=\'none\'">'
      + '<div class="thumb-overlay"></div>'
      + '<span class="thumb-badge">📹 TikTok</span>'
      + '</div>';
  }
  var body = document.createElement('div');
  body.className = 'result-body';
  var t = document.createElement('div');
  t.className = 'result-title'; t.textContent = data.titulo; body.appendChild(t);

  var chips = [];
  if (data.autor)    chips.push('👤 <b>@'+esc(data.autor)+'</b>');
  if (data.duracion) chips.push('⏱ <b>'+esc(data.duracion)+'</b>');
  if (data.plays)    chips.push('▶ '+esc(data.plays));
  if (data.likes)    chips.push('❤️ '+esc(data.likes));
  if (api_nombre)    chips.push('🔌 '+esc(api_nombre));
  if (chips.length) {
    var mr = document.createElement('div'); mr.className='chips';
    chips.forEach(function(c){ var s=document.createElement('span'); s.className='chip'; s.innerHTML=c; mr.appendChild(s); });
    body.appendChild(mr);
  }

  var grid = document.createElement('div'); grid.className='dl-grid';
  var b4k = data.url_4k ? mkBtn('dl-4k','🔥', data.url_4k!==data.url_hd?'Descargar 4K':'Descargar HD/4K','Máxima calidad',data.url_4k,data.autor,'hd') : null;
  if (b4k) grid.appendChild(b4k);
  var bHD = (data.url_hd && data.url_hd!==data.url_4k) ? mkBtn('dl-hd','📹','Descargar HD','Alta calidad H.264',data.url_hd,data.autor,'normal') : null;
  if (bHD) grid.appendChild(bHD);
  var bN = (data.url_normal && data.url_normal!==data.url_hd && data.url_normal!==data.url_4k) ? mkBtn('dl-normal','📱','Calidad Normal','Si los anteriores fallan',data.url_normal,data.autor,'normal') : null;
  if (bN) grid.appendChild(bN);
  var bA = data.url_audio ? mkBtn('dl-audio','🎵','Solo Audio MP3','Música sin imagen',data.url_audio,data.autor,'audio') : null;
  if (bA) grid.appendChild(bA);
  body.appendChild(grid);

  var tip = document.createElement('div'); tip.className='tip';
  tip.innerHTML='⚠️ <b>¿No reproduce?</b> Prueba 🔥 4K → 📹 HD → 📱 Normal en orden';
  body.appendChild(tip);
  box.appendChild(body);
  box.style.display='block';
}

async function buscar() {
  if (working) return;
  var url = document.getElementById('url-input').value.trim();
  var btn = document.getElementById('btn-main');
  if (!url) { setStatus('s-error','❌ Pega un enlace de TikTok primero'); return; }
  if (!/tiktok\.com|vm\.tiktok|vt\.tiktok/i.test(url)) { setStatus('s-error','❌ El enlace debe ser de TikTok'); return; }
  working=true; btn.disabled=true;
  document.getElementById('result-box').style.display='none';
  setProgress(null); setApiStatus(null);
  var errores=[],data=null,api_usada='';
  for (var i=0;i<APIS.length;i++) {
    var api=APIS[i];
    setStatus('s-loading','<span class="sp"></span> Intentando con <b>'+api.nombre+'</b>... ('+(i+1)+'/'+APIS.length+')');
    setProgress(Math.round(10+(i/APIS.length)*60));
    try {
      data = await Promise.race([
        api.call(url),
        new Promise(function(_,rej){ setTimeout(function(){ rej(new Error('Timeout')); },12000); })
      ]);
      if (data && (data.url_4k||data.url_hd||data.url_normal)) { api_usada=api.nombre; break; }
      else throw new Error('Vacío');
    } catch(e) { errores.push(api.nombre+': '+e.message); data=null; }
  }
  setProgress(null);
  if (data && api_usada) {
    setStatus('s-ok','✅ Video encontrado vía <b>'+esc(api_usada)+'</b> — prueba <b>4K</b> primero');
    render(data,api_usada);
  } else {
    setStatus('s-error','❌ No se pudo obtener el video.<br>'
      +'<small style="opacity:.65">'+errores.slice(0,2).map(esc).join(' · ')+'</small><br>'
      +'<small style="opacity:.5">Prueba con otro link o espera unos minutos.</small>');
  }
  working=false; btn.disabled=false;
}
</script>
